# ╔══════════════════════════════════════╗
# ║     HYPRLOCK — LOCK SCREEN           ║
# ║   Пастельная тема Catppuccin Mocha   ║
# ╚══════════════════════════════════════╝

general {
    grace = 5
    hide_cursor = true
    no_fade_in = false
    no_fade_out = false
    disable_loading_bar = false
}

# ===== Фон — текущие обои с blur =====
background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 10
    noise = 0.01
    contrast = 0.85
    brightness = 0.65
    vibrancy = 0.15
    vibrancy_darkness = 0.1
}

# ===== Часы (большие, по центру сверху) =====
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 0.95)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgba(0, 0, 0, 0.4)
    position = 0, 200
    halign = center
    valign = center
}

# ===== Дата =====
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(116, 199, 236, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.3)
    position = 0, 110
    halign = center
    valign = center
}

# ===== Приветствие =====
label {
    monitor =
    text = Hi, $USER
    color = rgba(116, 199, 236, 0.95)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(116, 199, 236, 0.15)
    position = 0, 30
    halign = center
    valign = center
}

# ===== Поле ввода пароля =====
input-field {
    monitor =
    size = 340, 55
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(116, 199, 236, 0.45)
    inner_color = rgba(30, 30, 46, 0.88)
    font_color = rgb(205, 214, 244)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text = <span foreground="##74c7ec"><i>    Type to unlock...</i></span>
    hide_input = false
    rounding = 15
    check_color = rgba(166, 227, 161, 0.6)
    fail_color = rgba(243, 139, 168, 0.6)
    fail_text = <span foreground="##f38ba8"><i>  Wrong password</i></span>
    fail_timeout = 2000
    fail_transition = 300
    capslock_color = rgba(249, 226, 175, 0.6)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -80
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
    shadow_color = rgba(116, 199, 236, 0.08)
}

# ===== Иконка батареи (для ноутбука) =====
label {
    monitor =
    text = cmd[update:5000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo '?')%"
    color = rgba(116, 199, 236, 0.6)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 30, -30
    halign = left
    valign = top
}

# ===== Текущая раскладка =====
label {
    monitor =
    text = cmd[update:500] hyprctl devices -j | jq -r '.keyboards[] | select(.main == true) .active_keymap' | head -1 | cut -c1-2 | tr a-z A-Z
    color = rgba(116, 199, 236, 0.6)
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = -30, -30
    halign = right
    valign = top
}

# ===== Подсказка снизу =====
label {
    monitor =
    text = Press ESC to clear  ·  Type password to unlock
    color = rgba(116, 199, 236, 0.3)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
