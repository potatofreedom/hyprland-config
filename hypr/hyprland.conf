# ╔══════════════════════════════════════════╗
# ║       HYPRLAND CONFIGURATION             ║
# ║   Maibenben X525 | i5-12400 | RTX 4060   ║
# ╚══════════════════════════════════════════╝

# ===== Загрузка ENV =====
source = ~/.config/hypr/env.conf

# ===== Монитор =====
# Встроенный экран 144Hz
monitor = eDP-1, preferred, auto, 1
# Если подключаешь внешний:
# monitor = HDMI-A-1, preferred, auto, 1

# ===== Автозапуск =====
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = dunst
exec-once = blueman-applet
exec-once = waybar
exec-once = swww-daemon
exec-once = sleep 1 && ~/.local/bin/set-wallpaper.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle

# ===== Ввод =====
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle

    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.5
    }
}

# ===== Общие настройки =====
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    allow_tearing = false
}

# ===== Декорации =====
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a2eee)
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
}

# ===== Анимации =====
animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1

    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, overshot, slidevert
    animation = layers, 1, 5, wind
}

# ===== Layout =====
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ===== Разное =====
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
}

# ===== Правила окон =====

# Плавающие окна
windowrule = float on, match:class pavucontrol
windowrule = float on, match:class blueman-manager
windowrule = float on, match:class nm-connection-editor
windowrule = float on, match:class thunar, match:title File Operation Progress
windowrule = float on, match:class org.kde.polkit-kde-authentication-agent-1
windowrule = float on, match:class easyeffects

# cava — аудио визуализатор как красивое плавающее окно
windowrule = float on, match:class kitty-cava
windowrule = size 800 300, match:class kitty-cava
windowrule = move 25% 65%, match:class kitty-cava
windowrule = opacity 0.85, match:class kitty-cava
windowrule = border_size 0, match:class kitty-cava
windowrule = no_anim on, match:class kitty-cava
windowrule = pin on, match:class kitty-cava

# Прозрачность
windowrule = opacity 0.88 0.85, match:class kitty
windowrule = opacity 0.90 0.88, match:class Code
windowrule = opacity 0.90 0.88, match:class thunar

# ===== XWayland =====
xwayland {
    force_zero_scaling = true
}

# ===== Жесты (тачпад) =====
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.3
}

# Свайп 3 пальцами — переключение воркспейсов
gesture = 3, horizontal, workspace

# ═════════════════════════════════════
# ═══════  ГОРЯЧИЕ КЛАВИШИ  ═════════
# ═════════════════════════════════════

$mainMod = SUPER

# ===== Основные =====
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, E, exec, thunar
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1

# ===== Скриншоты =====
bind = , Print, exec, ~/.local/bin/screenshot.sh full
bind = $mainMod, Print, exec, ~/.local/bin/screenshot.sh area
bind = $mainMod SHIFT, Print, exec, ~/.local/bin/screenshot.sh window
bind = $mainMod SHIFT, S, exec, ~/.local/bin/screenshot.sh area-clipboard

# ===== Color Picker =====
bind = $mainMod SHIFT, C, exec, ~/.local/bin/colorpicker.sh

# ===== Буфер обмена =====
bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ===== Блокировка =====
bind = $mainMod, L, exec, hyprlock

# ===== cava =====
bind = $mainMod SHIFT, A, exec, kitty --class kitty-cava -e cava

# ===== Обои =====
bind = $mainMod SHIFT, W, exec, ~/.local/bin/set-wallpaper.sh

# ===== Фокус =====
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ===== Перемещение окон =====
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ===== Изменение размера =====
bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

# ===== Воркспейсы =====
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ===== Перемещение окон в воркспейсы =====
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ===== Скролл по воркспейсам =====
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# ===== Мышь =====
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ===== Медиа-кнопки =====
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ===== Яркость =====
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ===== wlogout =====
bind = $mainMod, ESCAPE, exec, wlogout
