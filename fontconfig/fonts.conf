<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

    <!-- Субпиксельный рендеринг -->
    <match target="font">
        <edit name="antialias" mode="assign"><bool>true</bool></edit>
        <edit name="hinting" mode="assign"><bool>true</bool></edit>
        <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
        <edit name="rgba" mode="assign"><const>rgb</const></edit>
        <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
        <edit name="autohint" mode="assign"><bool>false</bool></edit>
        <edit name="embeddedbitmap" mode="assign"><bool>false</bool></edit>
    </match>

    <!-- Моноширинный шрифт по умолчанию -->
    <match target="pattern">
        <test qual="any" name="family"><string>monospace</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>JetBrainsMono Nerd Font</string>
        </edit>
    </match>

    <!-- Sans-serif шрифт по умолчанию -->
    <match target="pattern">
        <test qual="any" name="family"><string>sans-serif</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Sans</string>
        </edit>
    </match>

    <!-- Serif шрифт по умолчанию -->
    <match target="pattern">
        <test qual="any" name="family"><string>serif</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Serif</string>
        </edit>
    </match>

    <!-- Emoji через Noto Color Emoji -->
    <match target="pattern">
        <test qual="any" name="family"><string>emoji</string></test>
        <edit name="family" mode="prepend" binding="strong">
            <string>Noto Color Emoji</string>
        </edit>
    </match>

    <!-- Добавляем emoji фоллбэк ко всем шрифтам -->
    <match target="pattern">
        <edit name="family" mode="append">
            <string>Noto Color Emoji</string>
        </edit>
    </match>

    <!-- CJK через Noto Sans CJK -->
    <match target="pattern">
        <test name="lang" compare="contains"><string>ja</string></test>
        <edit name="family" mode="prepend"><string>Noto Sans CJK JP</string></edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains"><string>ko</string></test>
        <edit name="family" mode="prepend"><string>Noto Sans CJK KR</string></edit>
    </match>
    <match target="pattern">
        <test name="lang" compare="contains"><string>zh</string></test>
        <edit name="family" mode="prepend"><string>Noto Sans CJK SC</string></edit>
    </match>

</fontconfig>
