# Шрифт
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# Курсор
cursor_shape          beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5

# Скролл
scrollback_lines 10000

# Прозрачность (только фон, текст остаётся чётким)
background_opacity 0.50

# Отступы
window_padding_width 10

# Подтверждение закрытия
confirm_os_window_close 0

# Оболочка
shell fish

# URL
url_style curly
detect_urls yes
open_url_with default

# Звонок
enable_audio_bell no

# Начальный размер окна
remember_window_size  yes
initial_window_width  120c
initial_window_height 35c

# === Цветовая схема Catppuccin Mocha ===

# Основные
foreground           #cdd6f4
background           #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc
cursor               #f5e0dc
cursor_text_color    #1e1e2e
url_color            #f5e0dc

# Tabs
active_tab_foreground   #1e1e2e
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# Цвета терминала
# black
color0  #45475a
color8  #585b70
# red
color1  #f38ba8
color9  #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white
color7  #bac2de
color15 #a6adc8

# === Динамические цвета wallust (перезаписывают статические выше) ===
include colors-wallust.conf
